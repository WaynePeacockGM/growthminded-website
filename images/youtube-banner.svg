<svg xmlns="http://www.w3.org/2000/svg" width="2560" height="1440" viewBox="0 0 2560 1440">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@400;500;600&amp;display=swap');
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#243d5e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b942;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="2560" height="1440" fill="url(#bg)" />

  <!-- Subtle pattern circles -->
  <circle cx="200" cy="200" r="400" fill="rgba(255,255,255,0.02)" />
  <circle cx="2360" cy="1240" r="500" fill="rgba(255,255,255,0.02)" />
  <circle cx="2200" cy="300" r="300" fill="rgba(243,156,18,0.04)" />
  <circle cx="400" cy="1200" r="350" fill="rgba(243,156,18,0.04)" />

  <!-- Orange accent bar left -->
  <rect x="0" y="0" width="12" height="1440" fill="url(#accent)" />

  <!-- Logo mark box -->
  <rect x="200" y="560" width="160" height="160" rx="22" fill="#1a2e4a" stroke="#f39c12" stroke-width="3" />
  <text x="280" y="607" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, serif" font-weight="700" font-size="62" fill="#f39c12">G</text>
  <text x="280" y="673" text-anchor="middle" dominant-baseline="middle" font-family="Georgia, serif" font-weight="700" font-size="62" fill="white">M</text>

  <!-- Wordmark -->
  <text x="390" y="620" font-family="Georgia, serif" font-weight="700" font-size="96" fill="white">Growth</text>
  <text x="390" y="714" font-family="Georgia, serif" font-weight="700" font-size="96" fill="#f39c12">Minded</text>

  <!-- Divider line -->
  <rect x="200" y="760" width="900" height="3" fill="rgba(243,156,18,0.4)" />

  <!-- Tagline -->
  <text x="200" y="820" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="48" fill="rgba(255,255,255,0.75)" letter-spacing="2">Strategic Guidance for Lasting Growth</text>

  <!-- Right side credentials -->
  <text x="1600" y="580" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="40" fill="rgba(255,255,255,0.5)" letter-spacing="3">LEADERSHIP  ·  COACHING  ·  CAREER</text>

  <text x="1600" y="680" font-family="Georgia, serif" font-weight="700" font-size="72" fill="white">30+</text>
  <text x="1720" y="680" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="40" fill="rgba(255,255,255,0.65)">  Years Executive Leadership</text>

  <text x="1600" y="770" font-family="Georgia, serif" font-weight="700" font-size="72" fill="#f39c12">100's</text>
  <text x="1760" y="770" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="40" fill="rgba(255,255,255,0.65)">  Of Career Transformations</text>

  <text x="1600" y="860" font-family="Georgia, serif" font-weight="700" font-size="72" fill="white">IBM</text>
  <text x="1720" y="860" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="40" fill="rgba(255,255,255,0.65)">  Global Promotions Board</text>

  <!-- Divider vertical -->
  <rect x="1560" y="540" width="3" height="360" fill="rgba(243,156,18,0.3)" />

  <!-- Website URL bottom -->
  <text x="1280" y="1360" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="38" fill="rgba(255,255,255,0.4)" letter-spacing="4">www.growthminded.co.uk</text>

</svg>
